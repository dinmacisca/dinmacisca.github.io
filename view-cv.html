<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chidinma Francisca — CV</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --accent: #c9a84c;
    --text: #e8e8f0;
    --muted: #8888aa;
    --border: #2a2a3a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Arial', sans-serif; min-height: 100vh; }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 2.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 2rem; }
  .back-btn {
    color: var(--accent);
    text-decoration: none;
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
  }
  .cv-title {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.4rem;
    background: var(--accent);
    color: #000;
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    transition: opacity 0.2s;
  }
  .download-btn:hover { opacity: 0.85; }

  .viewer-container {
    width: 100%;
    height: calc(100vh - 65px);
    background: #525659;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .google-viewer {
    width: 100%;
    max-width: 900px;
    height: 100%;
    border: none;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .fallback {
    text-align: center;
    color: var(--text);
    padding: 3rem;
  }
  .fallback p { margin-bottom: 1.5rem; color: var(--muted); font-size: 0.95rem; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="back-btn">← Back to Portfolio</a>
    <span class="cv-title">Chukwujekwu Chidinma Francisca — CV</span>
  </div>
  <a href="Chidinma_Francisca_CV.docx" download="Chidinma_Francisca_CV.docx" class="download-btn">↓ Download CV</a>
</div>

<div class="viewer-container">
  <iframe
    class="google-viewer"
    src="https://docs.google.com/gview?url=https://dinmacisca.github.io/Chidinma_Francisca_CV.docx&embedded=true"
    title="Chidinma Francisca CV">
  </iframe>
</div>

</body>
</html>
